<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập: Nhiệt độ và Sự chuyển thể (Bản Chuẩn Độc Lập)</title>
    <style>
        /* --- Giữ nguyên CSS của bạn --- */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .quiz-container { width: 100%; max-width: 1000px; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background-color: #e0f7fa; border-bottom: 1px solid #007bff; font-weight: 600; color: #007bff; }
        .quiz-main { display: flex; }
        .sidebar { width: 250px; padding: 20px; background-color: #f8f9fa; border-right: 1px solid #ddd; }
        .content { flex-grow: 1; padding: 30px; min-height: 400px; }
        .nav-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .q-button { width: 35px; height: 35px; line-height: 35px; text-align: center; border: 1px solid #ccc; border-radius: 5px; background-color: #fff; cursor: pointer; font-weight: 500; }
        .q-button.current { background-color: #007bff; color: white; border-color: #007bff; }
        .q-button.answered { background-color: #28a745; color: white; }
        .question-index { font-size: 1.4em; font-weight: 700; color: #007bff; margin-bottom: 15px; border-bottom: 2px solid #007bff; padding-bottom: 5px; }
        .question-text { font-size: 1.15em; font-weight: 600; margin-bottom: 20px; line-height: 1.6; }
        .option { display: block; margin-bottom: 10px; padding: 12px; border: 1px solid #e9ecef; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .option:hover { background-color: #f1f8ff; }
        .feedback { margin-top: 15px; padding: 12px; border-radius: 8px; font-weight: bold; display: none; }
        .feedback.correct { background-color: #d4edda; color: #155724; }
        .feedback.incorrect { background-color: #f8d7da; color: #721c24; }
        .rationale { margin-top: 15px; padding: 15px; background-color: #fff3cd; border-left: 5px solid #ffc107; border-radius: 4px; display: none; }
        .footer-nav { display: flex; justify-content: space-between; margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
        .nav-btn, #submit-quiz, .show-answer-btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .nav-btn.prev { background-color: #6c757d; color: white; }
        .nav-btn.next { background-color: #007bff; color: white; }
        #submit-quiz { background-color: #dc3545; color: white; }
        .show-answer-btn { background-color: #17a2b8; color: white; margin-top: 10px; }
        #results { display: none; text-align: center; padding: 40px; }
        @media (max-width: 768px) { .quiz-main { flex-direction: column; } .sidebar { width: 100%; border-right: none; } }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="quiz-header">
        <div class="timer">⏱ Thời gian: <span id="time-left">10:00</span></div>
        <div class="progress">📍 Câu hỏi: <span id="current-progress">1</span>/20</div>
    </div>

    <div class="quiz-main">
        <div class="sidebar">
            <h3 style="margin-top:0">Danh mục câu</h3>
            <div class="nav-grid" id="q-nav-buttons"></div>
        </div>
        <div class="content" id="quiz-content-area">
            <p>Đang tải câu hỏi...</p>
        </div>
    </div>
    
    <div id="results"></div>
</div>

<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$']]
        },
        startup: {
            ready: () => {
                console.log('MathJax is ready!');
                MathJax.startup.defaultReady();
            }
        }
    };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>
    // Dữ liệu câu hỏi (Giữ nguyên từ file gốc của bạn)
    const questions = [
        { id: 1, type: "Ghi nhớ", question: "Khi hai vật có nhiệt độ khác nhau tiếp xúc với nhau thì năng lượng nhiệt sẽ truyền một cách tự phát từ:", options: ["Vật có nhiệt độ thấp hơn sang vật có nhiệt độ cao hơn.", "Vật có khối lượng lớn hơn sang vật có khối lượng nhỏ hơn.", "Vật có thể tích lớn hơn sang vật có thể tích nhỏ hơn.", "Vật có nhiệt độ cao hơn sang vật có nhiệt độ thấp hơn."], answer: 3, rationale: "Sự truyền nhiệt tự phát luôn xảy ra từ vật có nhiệt độ cao hơn sang vật có nhiệt độ thấp hơn theo Định luật Truyền nhiệt." },
        { id: 2, type: "Ghi nhớ", question: "Hai hệ ở trạng thái cân bằng nhiệt thì:", options: ["Chúng nhất thiết phải chứa cùng một lượng nhiệt.", "Chúng nhất thiết phải có cùng khối lượng.", "Chúng nhất thiết phải có cùng nhiệt độ.", "Chúng nhất thiết phải được cấu tạo từ cùng một chất."], answer: 2, rationale: "Trạng thái cân bằng nhiệt xảy ra khi hai hệ có nhiệt độ bằng nhau." },
        { id: 3, type: "Ghi nhớ", question: "Nhiệt độ chuẩn dùng để xây dựng thang đo Celsius là:", options: ["Nhiệt độ nóng chảy của sáp nến và nhiệt độ sôi của rượu.", "Nhiệt độ nóng chảy của sáp nến và nhiệt độ sôi của nước.", "Nhiệt độ nóng chảy của nước đá và nhiệt độ sôi của sáp nến.", "Nhiệt độ nóng chảy của nước đá và nhiệt độ sôi của nước tinh khiết ở áp suất tiêu chuẩn."], answer: 3, rationale: "Hai điểm này được gán giá trị lần lượt là $0^{\\circ}C$ và $100^{\\circ}C$." },
        { id: 4, type: "Ghi nhớ", question: "Ở nhiệt độ không tuyệt đối ($0 \\text{ K}$), động năng chuyển động nhiệt của các phân tử:", options: ["Bằng không.", "Đạt giá trị cực đại.", "Đạt giá trị cực tiểu nhưng khác không.", "Có thể thay đổi tùy thuộc vào chất."], answer: 0, rationale: "Nhiệt độ không tuyệt đối là giới hạn nơi chuyển động nhiệt của các phân tử ngừng lại." },
        { id: 5, type: "Ghi nhớ", question: "Mối liên hệ giữa thang nhiệt độ Celsius ($t$) và thang nhiệt độ Fahrenheit ($T_F$) là:", options: ["$T(^{\\circ}F)=1,8t(^{\\circ}C)+32$", "$T(^{\\circ}F)=1,8t(^{\\circ}C)+3,2$", "$T(^{\\circ}F)=3,2t(^{\\circ}C)+18$", "$T(^{\\circ}F)=18t(^{\\circ}C)+32$"], answer: 0, rationale: "Công thức chuẩn: $T_F = 1,8t + 32$." },
        { id: 6, type: "Ghi nhớ", question: "Mối liên hệ giữa thang nhiệt độ Celsius ($t$) và thang nhiệt độ Kelvin ($T_K$) là:", options: ["$T(K)=273t(^{\\circ}C)+273$", "$T(K)=t(^{\\circ}C)+273$", "$T(K)=1,8t(^{\\circ}C)+273$", "$T(K)=18t(^{\\circ}C)+32$"], answer: 1, rationale: "$T_K = t + 273$." },
        { id: 7, type: "Ghi nhớ", question: "Các vật không thể có nhiệt độ thấp hơn:", options: ["$5^{\\circ}C$", "$100 \\text{ K}$", "$-250^{\\circ}C$", "$-273,15^{\\circ}C$"], answer: 3, rationale: "Nhiệt độ không tuyệt đối là $0 \\text{ K} \\approx -273,15^{\\circ}C$." },
        { id: 8, type: "Hiểu", question: "Trong nhiệt kế thủy ngân, biến thiên $1^{\\circ}C$ bằng:", options: ["Biến thiên $1 \\text{ K}$", "Biến thiên $1,5 \\text{ K}$", "Biến thiên $2 \\text{ K}$", "Biến thiên $1,8 \\text{ K}$"], answer: 0, rationale: "Khoảng chia của thang Celsius và Kelvin bằng nhau." },
        { id: 9, type: "Hiểu", question: "Một độ biến thiên độ $C$ trên nhiệt kế cũng bằng:", options: ["$1^{\\circ}F$", "$0,5^{\\circ}F$", "$1,8^{\\circ}F$", "$2^{\\circ}F$"], answer: 2, rationale: "Tỉ lệ khoảng chia là $1,8$." },
        { id: 10, type: "Hiểu", question: "Điểm ba của nước theo độ $C$ là:", options: ["$0^{\\circ}C$", "$0,01^{\\circ}C$", "$-0,01^{\\circ}C$", "$100^{\\circ}C$"], answer: 1, rationale: "Định nghĩa là $0,01^{\\circ}C$." },
        { id: 11, type: "Hiểu", question: "Phạm vi đo của nhiệt kế thủy ngân đo thân nhiệt ($35^{\\circ}C$ đến $42^{\\circ}C$) thiết kế dựa trên:", options: ["Giới hạn dãn nở thủy ngân.", "Bao quát thân nhiệt bình thường và sốt ở người.", "Tính tuyến tính của thủy ngân.", "Cơ thể người luôn duy trì khoảng này."], answer: 1, rationale: "Tối ưu cho mục đích y tế." },
        { id: 12, type: "Hiểu", question: "Để xác định vạch $0^{\\circ}C$, ta đặt nhiệt kế vào:", options: ["Nước sôi.", "Ngăn đông tủ lạnh.", "Nước đá đang tan.", "Cơ thể người."], answer: 2, rationale: "Nước đá đang tan ở áp suất tiêu chuẩn là $0^{\\circ}C$." },
        { id: 13, type: "Hiểu", question: "Thả viên đá vào cốc nước. Nước tỏa hay nhận nhiệt, nhiệt độ tăng hay giảm?", options: ["Nhận nhiệt, tăng.", "Tỏa nhiệt, giảm.", "Nhận nhiệt, giảm.", "Tỏa nhiệt, tăng."], answer: 1, rationale: "Nước tỏa nhiệt cho đá tan nên nhiệt độ nước giảm." },
        { id: 14, type: "Hiểu", question: "Nhúng cốc nước vào bình nước ấm. Nước tỏa hay nhận nhiệt, nhiệt độ tăng hay giảm?", options: ["Tỏa nhiệt, giảm.", "Nhận nhiệt, tăng.", "Tỏa nhiệt, tăng.", "Nhận nhiệt, giảm."], answer: 1, rationale: "Nhận nhiệt từ nước ấm nên nhiệt độ tăng." },
        { id: 15, type: "Tính toán", question: "Vật có nhiệt độ $52^{\\circ}C$. Đổi sang độ $F$:", options: ["$125,6^{\\circ}F$", "$152,6^{\\circ}F$", "$126,5^{\\circ}F$", "$162,5^{\\circ}F$"], answer: 0, rationale: "$T_F = 1,8 \\times 52 + 32 = 125,6^{\\circ}F$." },
        { id: 16, type: "Tính toán", question: "Vật có nhiệt độ $95^{\\circ}F$. Đổi sang Kelvin (làm tròn):", options: ["$35 \\text{ K}$", "$308 \\text{ K}$", "$368 \\text{ K}$", "$178 \\text{ K}$"], answer: 1, rationale: "$t = (95-32)/1,8 = 35^{\\circ}C \\implies T = 35 + 273 = 308 \\text{ K}$." },
        { id: 17, type: "Tính toán", question: "Nhiệt độ $-89,2^{\\circ}C$ đổi sang độ $F$:", options: ["$-128,6^{\\circ}F$", "$-100,2^{\\circ}F$", "$-142,5^{\\circ}F$", "$-150,8^{\\circ}F$"], answer: 0, rationale: "$T_F = 1,8 \\times (-89,2) + 32 \approx -128,6^{\\circ}F$." },
        { id: 18, type: "Tính toán", question: "Đá ở $-10^{\\circ}C$ đổi sang độ $F$:", options: ["$14^{\\circ}F$", "$10^{\\circ}F$", "$20^{\\circ}F$", "$-18^{\\circ}F$"], answer: 0, rationale: "$T_F = 1,8 \times (-10) + 32 = 14^{\\circ}F$." },
        { id: 19, type: "Tính toán", question: "Nhiệt giai $X$ (Đông: $10X$, Sôi: $200X$). $50X$ là bao nhiêu độ $C$?", options: ["$21^{\\circ}C$", "$26^{\\circ}C$", "$20^{\\circ}C$", "$15^{\\circ}C$"], answer: 0, rationale: "$T_C = 100 \times \frac{50-10}{200-10} \approx 21^{\\circ}C$." },
        { id: 20, type: "Tính toán", question: "Từ $20^{\\circ}C$ đến $32^{\\circ}C$ là $1,5 \text{ cm}$. Từ $14^{\\circ}C$ đến $50^{\\circ}C$ là bao nhiêu?", options: ["$3,5 \text{ cm}$", "$4,5 \text{ cm}$", "$5,0 \text{ cm}$", "$6,5 \text{ cm}$"], answer: 1, rationale: "Tỉ lệ: $\frac{50-14}{32-20} \times 1,5 = 3 \times 1,5 = 4,5 \text{ cm}$." }
    ];

    let currentIdx = 0;
    const userAnswers = Array(questions.length).fill(null);
    let timeLeft = 600;
    let timerInterval;
    let isSubmitted = false;

    const contentArea = document.getElementById('quiz-content-area');
    const navButtons = document.getElementById('q-nav-buttons');

    function init() {
        renderNav();
        renderQuestion(0);
        startTimer();
    }

    function renderNav() {
        navButtons.innerHTML = questions.map((q, i) => `
            <div class="q-button" id="nav-${i}" onclick="renderQuestion(${i})">${q.id}</div>
        `).join('');
    }

    function renderQuestion(index) {
        currentIdx = index;
        const q = questions[index];
        const labels = ['A', 'B', 'C', 'D'];

        let optionsHTML = q.options.map((opt, i) => `
            <label class="option">
                <input type="radio" name="q" value="${i}" 
                    ${userAnswers[index] === i ? 'checked' : ''} 
                    ${isSubmitted ? 'disabled' : ''}
                    onchange="selectAns(${index}, ${i})">
                <strong>${labels[i]}.</strong> <span>${opt}</span>
            </label>
        `).join('');

        contentArea.innerHTML = `
            <div class="question-index">Câu ${q.id}/20</div>
            <p class="question-text">(${q.type}): ${q.question}</p>
            <div class="options-container">${optionsHTML}</div>
            <div class="feedback" id="fb-${index}"></div>
            <div class="rationale" id="rat-${index}"><strong>Lời giải:</strong> ${q.rationale}</div>
            
            <div class="footer-nav">
                <button class="nav-btn prev" onclick="changeQ(-1)" ${index === 0 ? 'disabled' : ''}>← Trước</button>
                ${index === 19 && !isSubmitted ? '<button id="submit-quiz" onclick="finish()">Nộp Bài</button>' : ''}
                ${isSubmitted ? `<button class="show-answer-btn" onclick="toggleRat(${index})">Xem lời giải</button>` : ''}
                <button class="nav-btn next" onclick="changeQ(1)" ${index === 19 ? 'disabled' : ''}>Tiếp →</button>
            </div>
        `;

        updateNavUI();
        if (window.MathJax) MathJax.typesetPromise([contentArea]);
        if (isSubmitted) showFeedback(index);
    }

    function selectAns(qIdx, ansIdx) {
        userAnswers[qIdx] = ansIdx;
        updateNavUI();
    }

    function updateNavUI() {
        document.querySelectorAll('.q-button').forEach((btn, i) => {
            btn.className = 'q-button';
            if (i === currentIdx) btn.classList.add('current');
            if (userAnswers[i] !== null) btn.classList.add('answered');
        });
        document.getElementById('current-progress').innerText = currentIdx + 1;
    }

    function changeQ(step) {
        let newIdx = currentIdx + step;
        if (newIdx >= 0 && newIdx < 20) renderQuestion(newIdx);
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeLeft <= 0) { finish(); return; }
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('time-left').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }

    function finish() {
        clearInterval(timerInterval);
        isSubmitted = true;
        let score = userAnswers.filter((a, i) => a === questions[i].answer).length;
        
        document.querySelector('.quiz-main').style.display = 'none';
        const res = document.getElementById('results');
        res.style.display = 'block';
        res.innerHTML = `
            <h2>Kết quả: ${score}/20</h2>
            <button class="nav-btn next" onclick="review()">Xem lại bài làm</button>
        `;
    }

    function review() {
        document.getElementById('results').style.display = 'none';
        document.querySelector('.quiz-main').style.display = 'flex';
        renderQuestion(0);
    }

    function showFeedback(idx) {
        const fb = document.getElementById(`fb-${idx}`);
        fb.style.display = 'block';
        if (userAnswers[idx] === questions[idx].answer) {
            fb.className = 'feedback correct';
            fb.innerText = 'Chính xác!';
        } else {
            fb.className = 'feedback incorrect';
            fb.innerText = 'Chưa đúng!';
        }
    }

    function toggleRat(idx) {
        const rat = document.getElementById(`rat-${idx}`);
        rat.style.display = rat.style.display === 'block' ? 'none' : 'block';
        if (window.MathJax) MathJax.typesetPromise([rat]);
    }

    // KHỞI CHẠY KHI TRANG SẴN SÀNG
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
